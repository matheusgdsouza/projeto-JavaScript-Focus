<!DOCTYPE html>
<html lang="pt-br" data-contexto="foco">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fokus</title>
    <link rel="shortcut icon" href="./imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"
        integrity="sha512-NmLkDIU1C/C88wi324HBc+S2kLhi08PN5GDeUVVVC/BVt/9Izdsc9SVeVfA1UZbY3sHUlDSyRXhCzHfr6hmPPw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&family=Unbounded:wght@200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <script src="./app/index.js" defer></script>
    <script src="./app/taskList.js" defer></script>
</head>

<body>
    <main class="app">
        <header class="app__header">
            <figure class="app__logo-figure">
                <img class="app__logo-image" src="/imagens/logo.png" alt="">
            </figure>
        </header>
        <section class="app__section-banner-container">
            <h1 class="app__title">
                Otimize sua produtividade,<br>
                <strong class="app__title-strong">mergulhe no que importa.</strong>
            </h1>
            <figure class="app__image-figure">
                <img class="app__image" src="/imagens/foco.png" alt="">
            </figure>
        </section>
        <section class="app__section-card-container">
            <div class="app__card">
                <ul class="app__card-list">
                    <li class="app__card-list-item">
                        <button data-contexto="foco" class="app__card-button app__card-button--foco">Foco</button>
                    </li>
                    <li class="app__card-list-item">
                        <button data-contexto="short" class="app__card-button app__card-button--curto">Descanso curto</button>
                    </li>
                    <li class="app__card-list-item">
                        <button data-contexto="long" class="app__card-button app__card-button--longo">Descanso longo</button>
                    </li>
                </ul>
                <div id="timer" class="app__card-timer"></div>
                <ul class="app__card-list">
                    <li class="app__card-list-item">
                        <label class="toggle">
                            <input class="toggle-checkbox" type="checkbox" id="alternar-musica">
                            <div class="toggle-switch"></div>
                        </label>
                    </li>
                    <li class="app__card-list-item">
                        <label class="app__card-list-label" for="alternar-musica">
                            Música
                        </label>
                    </li>
                </ul>
                <div class="app__card-primary-button-wrapper">
                    <button id="start-pause" class="app__card-primary-button">
                        <img class="app__card-primary-butto-icon" src="/imagens/play_arrow.png" alt='Botão iniciar'>
                        <span id="botao-iniciar">Começar</span>
                    </button>
                </div>
            </div>
        </section>

        <section class="app__task-list">
            <div class="app__task-list__container-text">
                <p class="tag-text-em-andamento">#Em andamento:</p>
                <p class="tag-text-task-name"></p>
            </div>
            <div class="app__task-list__container-menu">
                <h1 class="app__task-list__container-menu__title">Lista de tarefas:</h1>
                <button class="app__task-list__container-menu__button">
                    <img class="app__task-list__container-menu__button__img" src="./imagens/OptionIcon.png" alt="Icone de opções">
                </button>
            </div>

            <ul class="app__task-list__list">
                <!-- <li class="app__task-list__list__item">
                    <div class="app__task-list__list__item__container">
                        <img src="./imagens/check.png" alt="Icone de tarefa concluida" class="app__task-list__list__item__container__img-check">
                        <p class="app__task-list__list__item__container__text">Tarefa concluída</p>
                    </div>
                    <button class="app__task-list__list__item__button">
                        <img src="./imagens/Edit.png" alt="Icone de editar" class="app__task-list__list__item__img-edit">
                    </button>
                </li> -->
            </ul>

            <div class="app__task-list__container__new-task">
                <form class="app__task-lis__form-new-task" id="app__task-lis__form-new-task">
                    <label class="app__task-list__form-new-task__label" for="app__task-list__form-new-task__textarea">Adicionando tarefa</label>
                    <textarea name="app__task-list__form-new-task__textarea" class= "app__task-list__form-new-task__textarea" id="app__task-list__form-new-task__textarea" placeholder="Em que você está trabalhando?"></textarea>
                </form>
                <div class="new-task__containter__buttons">
                    <button class="new-task__containter__buttons__delet">
                        <img src="./imagens/delete_outline.png" alt="Icone de deletar">
                        <p>Deletar</p>
                    </button>
                    <div class="container__buttons__save-cancel">
                        <button class="new-task__containter__buttons__cancel">
                            <img src="./imagens/close.png" alt="Icone de cancelar">
                            <p>Cancelar</p>
                        </button>
                        <button form="app__task-lis__form-new-task" class="new-task__containter__buttons__save">
                            <img src="./imagens/save.png" alt="Icone de salvar">
                            <p>Salvar</p>
                        </button>
                    </div>
                </div>
            </div>

            <button class="app__task-list__butuon__new-task">
                <img src="./imagens/Add_lilás.png" alt="Icone de nova tarefa" class="app__task-list__butuon__new-task__img">
                <p class="app__task-list__butuon__new-task__text">Adicionar nova tarefa</p>
            </button>
        </section>


        <footer class="app__footer">
            <p class="app__footer-text">
                Projeto desenvolvido por Matheus Souza. 
            </p>
        </footer>
    </main>
</body>

</html>
